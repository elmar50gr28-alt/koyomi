name: Bazi Tests

on:
  pull_request:
  push:
    branches: [main, feature/bazi-knowledge-engine, feature/bazi-phase2-strength-pattern-yongshen]

jobs:
  bazi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:bazi
