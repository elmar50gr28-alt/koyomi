name: Validate

on:
  pull_request:
  push:
    branches: [main, feature/bazi-knowledge-engine, feature/bazi-phase2-strength-pattern-yongshen, feature/bazi-phase3-evidence-interpretation, feature/bazi-final-rc-quality, feature/bazi-reading-engine, feature/bazi-practical-tuning, feature/bazi-japanese-reading, feature/bazi-display-cleanup]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:static
